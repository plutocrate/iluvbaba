<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — i❤️baba</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body class="auth-page">
<div id="app">
  <header id="game-header">
    <div class="header-left" style="display:flex;align-items:center">
      <a href="/" class="logo">i❤️baba</a>
      <nav>
        <a href="/">Play</a><a href="/editor">Editor</a><a href="/community">Community</a>
      </nav>
    </div>
  </header>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card-head"><h1>Sign Up</h1></div>
      <div class="auth-card-body">
        <div id="auth-error" class="auth-error"></div>
        <div class="field"><label class="field-label">Username</label><input type="text" id="username" placeholder="3–32 characters"></div>
        <div class="field"><label class="field-label">Password</label><input type="password" id="password" placeholder="min 6 characters"></div>
        <div class="field"><label class="field-label">Confirm Password</label><input type="password" id="confirm" placeholder="repeat password"></div>
        <button id="register-btn" class="btn btn-primary" style="width:100%;height:42px;font-size:13px;">Create Account</button>
        <div class="auth-link">Already have an account? <a href="/login">Log in</a></div>
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { api } from '/js/ui/apiClient.js';
  document.getElementById('register-btn').addEventListener('click', async () => {
    const errEl = document.getElementById('auth-error');
    const pw = document.getElementById('password').value;
    if (pw !== document.getElementById('confirm').value) { errEl.textContent='Passwords do not match'; errEl.style.display='block'; return; }
    try { await api.register(document.getElementById('username').value, pw); window.location.href='/'; }
    catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
  });
</script>
</body>
</html>
