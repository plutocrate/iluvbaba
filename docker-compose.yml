version: '3.8'

services:
  # ===== PostgreSQL =====
  postgres:
    image: postgres:15-alpine
    container_name: baba-postgres
    environment:
      POSTGRES_DB: babaisfun
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: babapassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: baba-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Backend Server =====
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: baba-server
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:babapassword@postgres:5432/babaisfun
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./client:/app/client:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
