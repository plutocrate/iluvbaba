<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i❤️baba</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/client/styles/main.css">
</head>
<body class="play-page">
<div id="app">
  <header id="game-header">
    <div class="header-left" style="display:flex;align-items:center;flex:1;gap:0">
      <a href="/" class="logo">i❤️baba</a>
      <nav>
        <a href="/" class="active">Play</a>
        <a href="/editor">Editor</a>
        <a href="/community">Community</a>
      </nav>
    </div>
    <div class="header-right">
      <button id="voice-btn" class="btn btn-sm btn-ghost">🎤 Voice</button>
      <div id="voice-pill" class="voice-pill"><span class="dot"></span><span id="voice-status-text">Off</span></div>
      <div id="auth-nav" style="display:flex;gap:8px;align-items:center;"></div>
    </div>
  </header>
  <div id="game-container">
    <aside id="level-sidebar">
      <div class="sidebar-title">Levels</div>
      <div id="level-list"></div>
      <div class="sidebar-footer">
        <a href="/community" class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;">Community Maps</a>
      </div>
    </aside>
    <main id="game-main">
      <div id="level-info">
        <span id="level-title">Loading…</span>
        <span id="level-desc"></span>
        <span id="move-count">Moves: 0</span>
      </div>
      <div id="canvas-wrapper"><canvas id="game-canvas"></canvas></div>
      <div id="game-controls">
        <div class="ctrl-group">
          <span class="ctrl-key">↑</span><span class="ctrl-key">↓</span>
          <span class="ctrl-key">←</span><span class="ctrl-key">→</span>
          <span class="ctrl-label">Move</span>
        </div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-group"><span class="ctrl-key">Z</span><span class="ctrl-label">Undo</span></div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-group"><span class="ctrl-key">R</span><span class="ctrl-label">Restart</span></div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-group"><span class="ctrl-key">W A S D</span><span class="ctrl-label">also works</span></div>
        <div class="touch-controls" id="touch-controls">
          <div class="dpad">
            <button class="dpad-btn" data-dir="up">↑</button>
            <div class="dpad-row">
              <button class="dpad-btn" data-dir="left">←</button>
              <button class="dpad-btn" data-dir="undo" style="font-size:11px">↩</button>
              <button class="dpad-btn" data-dir="right">→</button>
            </div>
            <button class="dpad-btn" data-dir="down">↓</button>
          </div>
          <button class="btn btn-sm" id="restart-btn-touch">Restart</button>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="win-overlay" class="overlay hidden">
  <div class="overlay-box">
    <h2>You Win!</h2>
    <p id="win-level-name"></p><p id="win-moves"></p>
    <div class="overlay-btns">
      <button id="next-level-btn" class="btn btn-primary">Next Level →</button>
      <button id="retry-btn" class="btn btn-ghost">Retry</button>
    </div>
  </div>
</div>
<div id="dead-overlay" class="overlay hidden">
  <div class="overlay-box">
    <h2>Defeated</h2>
    <p>You lost the ability to move.</p>
    <p style="font-size:12px;color:#555;margin-top:6px">Press R to restart or Z to undo</p>
    <div class="overlay-btns">
      <button id="dead-retry-btn" class="btn btn-primary">Restart (R)</button>
      <button id="dead-undo-btn" class="btn btn-ghost">Undo (Z)</button>
    </div>
  </div>
</div>
<script type="module" src="/client/js/main.js"></script>
</body>
</html>
